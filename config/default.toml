# df — Polymarket paper-trading copy engine configuration

[session]
# Starting paper capital in USDC.
starting_capital = "10000"
# Maximum fraction of capital for a single copy trade (0.0 to 1.0).
max_position_fraction = "0.10"
# Maximum slippage in bps before a fill is skipped.
max_slippage_bps = "200"
# How to value open positions: "conservative" (best bid), "midpoint", or "last_trade".
marking_mode = "conservative"

[wallets]
directional_file = "config/tracked_wallets/directional_wallets.txt"
arbitrage_file = "config/tracked_wallets/arbitrage_wallets.txt"

[latency]
# Wallet trade polling mode: "baseline" or "aggressive".
# Baseline: directional 3s, arbitrage 5s. Aggressive: directional 1.5s, arbitrage 3s.
polling_mode = "aggressive"
# Simulated arrival delay in ms (time for our order to reach the exchange after detection).
arrival_delay_ms = 500
# Override polling intervals per category (ms). Uncomment to customize.
directional_interval_ms = 2500
# arbitrage_interval_ms = 5000

[fees]
# TTL for cached fee rates in seconds.
cache_ttl_secs = 3600
# What to do when fee data is completely unavailable (no live, no cache).
# "skip" = miss the trade honestly. "degrade" = fill with zero fee, mark degraded.
unavailable_policy = "skip"

[ingestion]
# Seconds between market metadata refreshes from Gamma API.
metadata_refresh_secs = 300
# Seconds of book silence before marking a token as stale.
stale_threshold_secs = 30
# Seconds of market inactivity before unsubscribing from book data.
market_prune_secs = 1800

[storage]
db_path = "data/df.db"
snapshot_interval_secs = 60
sessions_dir = "sessions"

[reporting]
# Mark-to-market interval in seconds for live unrealized PnL updates.
mark_interval_secs = 5
